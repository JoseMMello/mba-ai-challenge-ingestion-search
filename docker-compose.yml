services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres_rag
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bootstrap_vector_ext:
    image: pgvector/pgvector:pg17
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      PGPASSWORD=postgres
      psql "postgresql://postgres@postgres:5432/rag" -v ON_ERROR_STOP=1
      -c "CREATE EXTENSION IF NOT EXISTS vector;"
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_INTERNAL:-postgresql+psycopg://postgres:postgres@postgres:5432/rag}
      PG_VECTOR_COLLECTION_NAME: ${PG_VECTOR_COLLECTION_NAME:-documents}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      PDF_PATH: /app/document.pdf
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      AUTO_INGEST_ON_START: ${AUTO_INGEST_ON_START:-true}
    depends_on:
      bootstrap_vector_ext:
        condition: service_completed_successfully
    command: ["uvicorn", "api:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "src"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/document.pdf:/app/document.pdf:ro
      - ./backend/docker:/app/docker:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
